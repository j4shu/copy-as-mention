name: Build VSIX

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: |
          npm install -g @vscode/vsce
          vsce package --allow-missing-repository --out copy-as-mention.vsix

      - name: Delete previous rolling release
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish rolling release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest
          body: Rolling build of the latest commit on `main`. Download `copy-as-mention.vsix` below.
          files: copy-as-mention.vsix
          make_latest: true
